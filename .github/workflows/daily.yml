name: Daily SPY news summary

on:
  schedule:
    # Weekdays 11:30 UTC (tweak as desired)
    - cron: "30 11 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-spy-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r spy-daily-news/requirements.txt

      - name: Generate summary
        run: |
          python spy-daily-news/src/daily_spy_news.py

      - name: Commit summary (if changed)
        run: |
          if [ -z "$(git status --porcelain spy-daily-news/summaries/)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spy-daily-news/summaries/
          git commit -m "Add daily SPY news summary"
          git push

